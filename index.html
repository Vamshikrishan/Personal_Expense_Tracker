<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-wallet2 me-2" style="font-size: 24px; color: #667eea;"></i>Expense Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link fw-600" href="#"><i class="bi bi-house me-2"></i>Home</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="total-spent-container">
            <div class="row align-items-center justify-content-between">
                <div class="col-auto">
                    <div class="total-spent-label"><i class="bi bi-graph-up"></i> Total Amount Spent</div>
                    <div class="total-spent-value">₹<span id="totalSpent">0</span></div>
                </div>
                <div class="col-auto d-flex gap-2 flex-wrap justify-content-end">
                    <button class="btn btn-add-expense" data-bs-toggle="modal" data-bs-target="#addExpenseModal" onclick="showExpenseModel()">
                        <i class="bi bi-plus-circle me-2"></i>Add Expense
                    </button>
                    <button class="btn btn-reset-expenses" onclick="resetAllExpenses()">
                        <i class="bi bi-arrow-clockwise me-2"></i>Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th width="5%"><i class="bi bi-hash"></i></th>
                                        <th width="40%"><i class="bi bi-file-text"></i> Description</th>
                                        <th width="25%"><i class="bi bi-calendar-event"></i> Date</th>
                                        <th width="30%"><i class="bi bi-cash-coin"></i> Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseTableBody">
                                    <tr><td colspan="4" class="text-center no-data"><i class="bi bi-inbox"></i> No expenses recorded yet</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addExpenseModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addExpenseModalLabel"><i class="bi bi-plus-circle me-2"></i>Add New Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addExpenseForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="addExpenseDescription" class="form-label"><i class="bi bi-file-text"></i> Description</label>
                            <textarea class="form-control" id="addExpenseDescription" name="addExpenseDescription" rows="3" placeholder="What did you spend money on?" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="addExpenseExpenditureDate" class="form-label"><i class="bi bi-calendar-event"></i> Expenditure Date</label>
                            <input type="date" class="form-control" id="addExpenseExpenditureDate" name="addExpenseExpenditureDate" required>
                        </div>
                        <div class="mb-3">
                            <label for="addExpenseSpentAmount" class="form-label"><i class="bi bi-cash-coin"></i> Amount Spent</label>
                            <input type="number" class="form-control" id="addExpenseSpentAmount" name="addExpenseSpentAmount" step="0.01" placeholder="0.00" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-circle me-2"></i>Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="saveExpense()"><i class="bi bi-check-circle me-2"></i>Add Expense</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>

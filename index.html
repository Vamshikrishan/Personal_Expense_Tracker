<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./imagger/pay.png" alt="Logo" width="35" class="img-fluid">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <li class="bi bi-list"></li>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    Home
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="float-end">
            <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal" onclick="showExpenseModel()">Add Expense</button>
        </div>
        <div class="float-start">
            <label class="text-success"><b>Total Spent</b></label>
            <b>1500</b>
        </div>
    </div>
    <div class="container py-5 px-5">
        <div class="d-flex justify-content-center">
            <div class="col-sm-12 col-md-12 col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <table class="table">
                            <thead class="text-center">
                                <th>#</th>
                                <th>Description</th>
                                <th>Date</th>
                                <th>Spent Amount</th>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addExpenseModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
        <form id="addExpenseForm">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addExpenseModalLabel">Add Expense</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-1">
                            <label for="addExpenseDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="addExpenseDescription" name="addExpenseDescription" rows="3" placeholder="Add your Expense Description" required></textarea>
                        </div>
                        <div class="mb-1">
                            <label for="addExpenseExpenditureDate" class="form-label">Expenditure Date</label>
                            <input type="date" class="form-control" id="addExpenseExpenditureDate" name="addExpenseExpenditureDate" required>
                        </div>
                        <div class="mb-1">
                            <label for="addExpenseSpentAmount" class="form-label">Spent Amount</label>
                            <input type="number" class="form-control" id="addExpenseSpentAmount" name="addExpenseSpentAmount" step="0.01" placeholder="Enter the amount spent" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="saveExpense()">Add Expense</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function showExpenseModel() {
            $('#addExpenseModal').modal('show');
        }

        function saveExpense() {
            var dataArr = $('#addExpenseForm').serializeArray();
            console.log(dataArr);
            var expenseObjeect = new Object();
            var storageObjectArr = [];
            var storageObject = localStorage.getItem('expenseTracker');
            for(var i in dataArr) {
                var name = dataArr[i].name;
                var value = dataArr[i].value;
                expenseObjeect[name] = value;
            }
            console.log(expenseObjeect)
            if(storageObject != null && storageObject != undefined && storageObject != '') {
                storageObjectArr = JSON.parse(storageObject);
                
            }
            $('#addExpenseModal').modal('hide');
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
